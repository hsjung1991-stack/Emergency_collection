name: ER Data Collector

on:
  schedule:
    - cron: '*/5 * * * *'  # 🌟 5분마다 실행 (가장 중요!)
  workflow_dispatch:       # 수동 실행 버튼 유지

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml pandas sqlalchemy psycopg2-binary

      - name: Run Collector
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python collector.py
